buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// async-storage v3 ships storage-android as a local Maven repo that is NOT on
// Maven Central. allprojects additively injects this repo into every subproject
// (including the async-storage module itself), so its own per-project repo
// declarations do not block resolution.
allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
    }
}
